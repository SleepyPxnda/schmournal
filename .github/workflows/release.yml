name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build & release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            artifact: schmournal-darwin-arm64
          - goos: darwin
            goarch: amd64
            artifact: schmournal-darwin-amd64
          - goos: linux
            goarch: amd64
            artifact: schmournal-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: schmournal-linux-arm64
          - goos: windows
            goarch: amd64
            artifact: schmournal-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact: schmournal-windows-arm64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/${{ matrix.artifact }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
