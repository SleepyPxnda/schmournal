name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build & release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            artifact: schmournal-darwin-arm64
          - goos: darwin
            goarch: amd64
            artifact: schmournal-darwin-amd64
          - goos: linux
            goarch: amd64
            artifact: schmournal-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: schmournal-linux-arm64
          - goos: windows
            goarch: amd64
            artifact: schmournal-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact: schmournal-windows-arm64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/${{ matrix.artifact }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  update-formula:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256 of source tarball
        id: sha
        run: |
          TAG=${{ github.ref_name }}
          URL="https://github.com/SleepyPxnda/schmournal/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          TAG=${{ github.ref_name }}
          SHA=${{ steps.sha.outputs.sha256 }}
          sed -i "s|archive/refs/tags/[^\"]*\.tar\.gz|archive/refs/tags/${TAG}.tar.gz|" HomebrewFormula/schmournal.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" HomebrewFormula/schmournal.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HomebrewFormula/schmournal.rb
          git diff --cached --quiet || git commit -m "chore: update Homebrew formula for ${{ github.ref_name }}
          git push
